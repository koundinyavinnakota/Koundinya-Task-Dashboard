# ============================================================
# Koundinya Task Dashboard — GitHub Pages Deploy Workflow
# Triggered on every push to the main branch.
# Deploys the static files (index.html, style.css, script.js)
# directly to GitHub Pages — no build step needed.
# ============================================================

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy Static Site
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List files to confirm checkout
        run: ls -la

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static files as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
